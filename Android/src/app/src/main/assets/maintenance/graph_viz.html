<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱可视化</title>
<script src="vis-network.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; font-family: -apple-system, sans-serif; overflow: hidden; }
#graph { width: 100vw; height: 100vh; }
#legend {
  position: absolute; top: 8px; left: 8px;
  background: rgba(26,26,46,0.9); border-radius: 8px; padding: 8px 12px;
  color: #e0e0e0; font-size: 11px; line-height: 1.8;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
#title {
  position: absolute; top: 8px; right: 8px;
  background: rgba(26,26,46,0.9); border-radius: 8px; padding: 6px 12px;
  color: #82b1ff; font-size: 12px; font-weight: 600;
}
</style>
</head>
<body>
<div id="graph"></div>
<div id="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#E53935"></span>故障症状</div>
  <div class="legend-item"><span class="legend-dot" style="background:#FB8C00"></span>故障原因</div>
  <div class="legend-item"><span class="legend-dot" style="background:#43A047"></span>备件</div>
  <div class="legend-item"><span class="legend-dot" style="background:#8E24AA"></span>维修步骤</div>
  <div class="legend-item"><span class="legend-dot" style="background:#1E88E5"></span>维修人员</div>
  <div class="legend-item"><span class="legend-dot" style="background:#78909C"></span>历史工单</div>
  <div class="legend-item"><span class="legend-dot" style="background:#26C6DA"></span>设备</div>
</div>
<div id="title">端侧 GraphRAG 知识图谱</div>

<script>
var NODE_COLORS = {
  'FAULT_SYMPTOM': { background: '#E53935', border: '#B71C1C', font: '#fff' },
  'ROOT_CAUSE':    { background: '#FB8C00', border: '#E65100', font: '#fff' },
  'PART':          { background: '#43A047', border: '#1B5E20', font: '#fff' },
  'REPAIR_STEP':   { background: '#8E24AA', border: '#4A148C', font: '#fff' },
  'PERSONNEL':     { background: '#1E88E5', border: '#0D47A1', font: '#fff' },
  'WORK_ORDER':    { background: '#78909C', border: '#37474F', font: '#fff' },
  'EQUIPMENT':     { background: '#26C6DA', border: '#00838F', font: '#fff' },
};

var NODE_SHAPES = {
  'FAULT_SYMPTOM': 'star',
  'ROOT_CAUSE':    'diamond',
  'PART':          'square',
  'REPAIR_STEP':   'triangle',
  'PERSONNEL':     'dot',
  'WORK_ORDER':    'box',
  'EQUIPMENT':     'hexagon',
};

var EDGE_LABELS = {
  'HAS_SYMPTOM':    '出现症状',
  'CAUSED_BY':      '原因',
  'REQUIRES_PART':  '需要备件',
  'HAS_REPAIR_STEP':'维修步骤',
  'REPAIRED_BY':    '维修人员',
  'HAS_WORK_ORDER': '历史工单',
};

window['ai_edge_gallery_get_result'] = async function(data) {
  try {
    var graphData = JSON.parse(data);
    var visNodes = [];
    var visEdges = [];

    for (var i = 0; i < graphData.nodes.length; i++) {
      var node = graphData.nodes[i];
      var colors = NODE_COLORS[node.type] || NODE_COLORS['EQUIPMENT'];
      var isCenter = (node.id === graphData.centerNodeId);
      visNodes.push({
        id: node.id,
        label: node.label,
        shape: NODE_SHAPES[node.type] || 'dot',
        color: { background: colors.background, border: colors.border },
        font: { color: colors.font, size: isCenter ? 16 : 12, face: 'sans-serif' },
        size: isCenter ? 35 : 20,
        borderWidth: isCenter ? 3 : 1,
        shadow: isCenter,
        title: buildTooltip(node),
      });
    }

    for (var j = 0; j < graphData.edges.length; j++) {
      var edge = graphData.edges[j];
      var label = EDGE_LABELS[edge.relation] || edge.relation;
      var prob = edge.properties && edge.properties.probability;
      if (prob) { label += ' (' + (parseFloat(prob) * 100).toFixed(0) + '%)'; }
      visEdges.push({
        from: edge.source,
        to: edge.target,
        label: label,
        font: { size: 9, color: '#aaa', strokeWidth: 0 },
        color: { color: '#555', highlight: '#82b1ff' },
        arrows: { to: { enabled: true, scaleFactor: 0.5 } },
        smooth: { type: 'curvedCW', roundness: 0.15 },
      });
    }

    var container = document.getElementById('graph');
    var network = new vis.Network(container, {
      nodes: new vis.DataSet(visNodes),
      edges: new vis.DataSet(visEdges),
    }, {
      physics: {
        solver: 'forceAtlas2Based',
        forceAtlas2Based: { gravitationalConstant: -60, centralGravity: 0.008, springLength: 120, springConstant: 0.06 },
        stabilization: { iterations: 150 },
      },
      interaction: { hover: true, tooltipDelay: 200, zoomView: true, dragView: true },
      layout: { improvedLayout: true },
    });

    await new Promise(function(resolve) {
      network.once('stabilizationIterationsDone', resolve);
      setTimeout(resolve, 5000);
    });

    network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });

    return JSON.stringify({
      result: '知识图谱渲染完成，共 ' + visNodes.length + ' 个节点，' + visEdges.length + ' 条关系',
      webview: { url: 'graph_viz.html', aspectRatio: 1.0 }
    });
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
};

function buildTooltip(node) {
  var lines = [node.label + ' (' + node.type + ')'];
  if (node.properties) {
    var keys = Object.keys(node.properties);
    for (var k = 0; k < keys.length; k++) {
      lines.push(keys[k] + ': ' + node.properties[keys[k]]);
    }
  }
  return lines.join('\n');
}
</script>
</body>
</html>
